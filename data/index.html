<html>
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
      <title>Universal ESP32 Controller</title>
      <!-- Import CSS -->
      <link rel="stylesheet" href="style.css" />
   </head>
   <body>
      <div class="top-bar">
         <select id="remoteSelect">
            <option value="tv_sala">Viewsonic</option>
            <option value="audio">Samsung</option>
            <option value="leds">Unknown</option>
         </select>

         <div class="toggle-container">
            <span id="modeText">Mode: Use Control</span>
            <label class="switch">
               <input type="checkbox" id="learnToggle" onchange="updateMode()" />
               <span class="slider"></span>
            </label>
         </div>
      </div>

      <div class="remote-body">
         <button class="btn-power" onclick="handleClick('power')">POWER</button>
         <div class="d-pad">
            <button class="d-up" onclick="handleClick('up')">▲</button>
            <button class="d-left" onclick="handleClick('left')">◀</button>
            <button class="d-center" onclick="handleClick('ok')">OK</button>
            <button class="d-right" onclick="handleClick('right')">▶</button>
            <button class="d-down" onclick="handleClick('down')">▼</button>
         </div>
         <button onclick="handleClick('vol_up')">Vol +</button>
         <button onclick="handleClick('ch_up')">Ch +</button>
         <button onclick="handleClick('vol_down')">Vol -</button>
         <button onclick="handleClick('ch_down')">Ch -</button>
         <button class="macro-row" onclick="handleClick('m1')">M1</button>
         <button class="macro-row" onclick="handleClick('m2')">M2</button>
      </div>

      <div id="status">Message...</div>

      <!-- Import Javascript -->
      <script src="script.js?v=4"></script>
   </body>
</html>
